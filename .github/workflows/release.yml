name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -o dist/cc-lens-linux-amd64 .
          GOOS=darwin  GOARCH=amd64 go build -o dist/cc-lens-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64 go build -o dist/cc-lens-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -o dist/cc-lens-windows-amd64.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

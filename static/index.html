<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>wrapminal · activity</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f4;color:#1c1917;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;padding:24px}
.page{max-width:960px;margin:0 auto}
h1{font-size:1.5rem;font-weight:700;margin-bottom:4px}
.sub{color:#78716c;font-size:.85rem;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:20px}
.card{background:#fff;border:1px solid #e7e5e4;border-radius:8px;padding:14px}
.card-val{font-size:1.8rem;font-weight:700;line-height:1;margin-bottom:4px}
.card-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:#78716c}
.section{margin-bottom:20px}
.section-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #e7e5e4}
.section-h h2{font-size:.9rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#292524}
.section-h span{font-size:.7rem;color:#a8a29e}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{text-align:left;padding:8px 6px;font-weight:600;color:#78716c;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #e7e5e4}
td{padding:6px;border-bottom:1px solid #f0efed;white-space:nowrap}
td:first-child{padding-left:0}td:last-child{padding-right:0}
tr.clickable{cursor:pointer}tr.clickable:hover{background:#f0efed}
tr.clickable.active{background:#e7e5e4}
.detail-row{display:none}
.detail-row.open{display:table-row}
.detail-cell{padding:12px 16px;background:#fafaf9;border:1px solid #e7e5e4;border-radius:6px;margin:4px 0}
.loop-box{border:1px solid #d6d3d1;border-radius:8px;padding:16px;background:#fff;margin:8px 0;display:flex;gap:20px;flex-wrap:wrap}
.loop-box .big{font-size:2.2rem;font-weight:700;line-height:1}
.loop-box .unit{font-size:.8rem;color:#78716c;margin-top:2px}
.loop-box .badge{display:inline-block;padding:2px 8px;border:1px solid #292524;font-size:.65rem;font-weight:600;text-transform:uppercase;margin-top:6px}
.loop-box .trace{font-size:.78rem;line-height:1.8}
.loop-box .trace span{display:inline-block;min-width:70px}
.trace-fail{color:#dc2626;font-weight:600}
.trace-pass{color:#16a34a;font-weight:600}
.trace-work{color:#ca8a04;font-weight:600}
.bar-wrap{display:flex;align-items:center;gap:6px;margin:2px 0;font-size:.75rem}
.bar{height:12px;border-radius:3px;transition:width .3s;flex-shrink:0}
.bar-label{width:80px;text-align:right;color:#78716c;flex-shrink:0;overflow:hidden;text-overflow:ellipsis}
.bar-count{width:40px;text-align:right;color:#292524;flex-shrink:0}
.bar1{background:#2563eb}.bar2{background:#7c3aed}.bar3{background:#059669}.bar4{background:#d97706}.bar5{background:#dc2626}
.detail-inner{font-size:.78rem;line-height:1.6;color:#57534e}
.detail-inner strong{color:#292524}
@media(max-width:600px){body{padding:12px}.grid{grid-template-columns:repeat(2,1fr)}.loop-box{flex-direction:column}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.loading-note{color:#78716c;font-size:.82rem;margin:6px 0 16px}
.skeleton .card{animation:pulse 1.2s ease-in-out infinite}
.skeleton .card-val{background:#e7e5e4;border-radius:4px;width:60%;height:1.8rem}
.skeleton .card-label{background:#ececea;border-radius:3px;width:80%;height:.7rem;margin-top:8px}
.error-box{text-align:center;padding:48px 20px;color:#78716c}
.error-box .mark{font-size:1.6rem;margin-bottom:10px}
.error-box code{background:#e7e5e4;padding:2px 6px;border-radius:3px}
</style>
</head>
<body>
<div class="page">
  <h1>wrapminal</h1>
  <div class="sub" id="subtitle"></div>
  <div id="app"></div>
</div>
<script>
async function main(){
  const app=document.getElementById('app');
  document.getElementById('subtitle').textContent='scanning local agent history…';
  app.innerHTML='<div class="loading-note">scanning your local agent history — this can take a few seconds on large histories…</div><div class="grid skeleton">'+'<div class="card"><div class="card-val"></div><div class="card-label"></div></div>'.repeat(6)+'</div>';
  let d;
  try{
    const r=await fetch('/api/wrapped');
    if(!r.ok)throw new Error('HTTP '+r.status);
    d=await r.json();
  }catch(err){
    document.getElementById('subtitle').textContent='local only';
    app.innerHTML='<div class="error-box"><div class="mark">⚠</div><p>Could not reach the wrapminal server.</p><p style="font-size:.8rem;margin-top:8px">Make sure it\'s running, then reload. Raw data: <code>curl -s http://localhost:8080/api/wrapped</code></p></div>';
    return;
  }
  window.d=d;
  document.getElementById('subtitle').textContent=new Date(d.generated_at).toLocaleString()+' · local only';
  const html=[];
  // totals
  const t=d.totals;
  html.push(`<div class="grid">${[['prompts',t.prompts],['sessions',t.sessions],['projects',t.projects],['active days',t.active_days],['sources',t.sources],['est. tokens',t.estimated_tokens]].map(([k,v])=>`<div class="card"><div class="card-val">${fmt(v)}</div><div class="card-label">${k}</div></div>`).join('')}</div>`);
  // resolved loops
  const l=d.resolved_loops||{};const c=l.count||0;const p=l.evidence==='proven'&&c>0;
  html.push(`<div class="section"><div class="section-h"><h2>resolved loops</h2><span>${p?'proven':'none detected'}</span></div>`);
  if(p){
    const ex=l.example||{};const at=Math.max(Number(ex.attempts||0),2);
    const lb=c===1?'THE BUG BLINKED FIRST':c<5?'COMEBACK MERCHANT':'ABSOLUTELY REFUSED TO QUIT';
    html.push(`<div class="loop-box"><div><div class="big">${fmt(c)}</div><div class="unit">loop${c!==1?'s':''} escaped</div><div class="badge">${esc(lb)}</div></div><div class="trace"><div>01<span style="color:#78716c"> stuck</span>  <span class="trace-fail">FAILED</span></div><div>02<span style="color:#78716c"> work</span>  ${fmt(at)} attempts  <span class="trace-work">KEPT GOING</span></div><div>03<span style="color:#78716c"> proof</span>  later check passed  <span class="trace-pass">PASSED</span></div><div style="color:#a8a29e;font-size:.7rem;margin-top:6px">via ${esc(ex.source||'history')} · ${fmt(l.sessions_scanned)} sessions scanned</div></div></div>`);
  }else{
    html.push(`<div style="padding:10px 0;color:#78716c;font-size:.82rem">${fmt(l.sessions_scanned||0)} sessions scanned, no fail→pass verification pair found.</div>`);
  }
  html.push('</div>');
  // agent breakdown
  const agents=d.source_breakdown||[];const amax=Math.max(...agents.map(a=>a.prompts),1);
  html.push(`<div class="section"><div class="section-h"><h2>agents</h2><span>${agents.length} with data</span></div>`);
  agents.forEach((a,i)=>{const pct=a.prompts/amax*100;html.push(`<div class="bar-wrap"><span class="bar-label">${esc(a.name)}</span><span class="bar bar${(i%5)+1}" style="width:${pct*2}px"></span><span class="bar-count">${fmt(a.prompts)}</span><span style="color:#a8a29e;font-size:.68rem">${fmt(a.sessions)}sessions</span></div>`);});
  html.push('</div>');
  // all sources: only ones with real data; collapse the empty/probed rest into one line
  const srcLoaded=d.sources.filter(s=>s.state==='loaded'&&(s.records||0)>0);
  const srcEmpty=d.sources.filter(s=>!(s.state==='loaded'&&(s.records||0)>0));
  html.push(`<div class="section"><div class="section-h"><h2>all sources</h2><span>${srcLoaded.length} active</span></div><table><thead><tr><th>source</th><th>state</th><th>records</th><th>path</th></tr></thead><tbody>`);
  srcLoaded.forEach(s=>{html.push(`<tr><td>${esc(s.name)}</td><td>${esc(s.state)}</td><td>${s.records||0}</td><td style="font-size:.68rem;color:#a8a29e">${esc((s.path||'').replace(/^\/home\/([^/]+)/,'~'))}</td></tr>`);});
  html.push('</tbody></table>');
  if(srcEmpty.length)html.push(`<div style="font-size:.72rem;color:#a8a29e;padding:8px 0">+ ${srcEmpty.length} other tools checked, nothing found</div>`);
  html.push('</div>');
  // highlights
  html.push(`<div class="section"><div class="section-h"><h2>highlights</h2></div><table><thead><tr><th>metric</th><th>value</th><th>detail</th></tr></thead><tbody>`);
  (d.highlights||[]).forEach(h=>{html.push(`<tr><td style="font-weight:600">${esc(h.title)}</td><td>${esc(h.value)}</td><td style="color:#78716c;font-size:.75rem">${esc(h.detail||'')}</td></tr>`);});
  html.push('</tbody></table></div>');
  // top projects
  const projects=(d.projects||[]).slice(0,15);
  html.push(`<div class="section"><div class="section-h"><h2>top projects</h2><span>${d.projects.length} total · top 15</span></div><table><thead><tr><th>project</th><th>agent</th><th>prompts</th><th>active days</th><th>tokens</th></tr></thead><tbody>`);
  projects.forEach(p=>{
    html.push(`<tr class="clickable" onclick="toggleDetail(this)" data-id="${esc(p.name)}-${esc(p.source_id)}"><td style="font-weight:600">${esc(p.name)}</td><td style="color:#78716c;font-size:.75rem">${esc(p.source||'')}</td><td>${fmt(p.prompts)}</td><td>${fmt(p.active_days||0)}</td><td>${fmt(p.tokens||0)}</td></tr>`);
    html.push(`<tr class="detail-row" id="d-${esc(p.name)}-${esc(p.source_id)}"><td colspan="5"><div class="detail-inner"><strong>First:</strong> ${esc(p.first_date||'?')} · <strong>Last:</strong> ${esc(p.last_date||'?')} · <strong>Confidence:</strong> ${esc(p.confidence||'?')} · <strong>Intensity:</strong> ${p.intensity ? Number(p.intensity).toFixed(2) : '?'} prompts/day</div></td></tr>`);
  });
  html.push('</tbody></table></div>');
  // timeline
  const weeks=(d.timeline&&d.timeline.weeks)||[];const wmax=Math.max(...weeks.map(w=>w.prompts),1);
  const months=(d.timeline&&d.timeline.months)||[];
  html.push(`<div class="section"><div class="section-h"><h2>timeline</h2><span>${weeks.length} weeks · ${months.length} months</span></div><table><thead><tr><th>month</th><th style="width:60%">activity</th><th>prompts</th></tr></thead><tbody>`);
  months.forEach(m=>{
    const pct=m.prompts/wmax*100;const barW=Math.min(pct,100);
    html.push(`<tr><td style="font-weight:600">${esc(m.month)}</td><td><span class="bar bar1" style="display:inline-block;width:${barW*2}px;height:10px"></span></td><td>${fmt(m.prompts)}</td></tr>`);
  });
  html.push('</tbody></table></div>');
  // raw data link
  html.push('<div style="margin:24px 0;padding:12px;background:#fafaf9;border:1px solid #e7e5e4;border-radius:6px;font-size:.78rem">');
  html.push('<span style="font-weight:600">Raw data:</span> <code style="background:#e7e5e4;padding:2px 6px;border-radius:3px">curl -s http://localhost:8080/api/wrapped | jq .</code>');
  html.push('</div>');
  document.getElementById('app').innerHTML=html.join('');
}
function toggleDetail(el){
  const id=el.getAttribute('data-id');
  const row=document.getElementById(`d-${id}`);
  if(row){row.classList.toggle('open');el.classList.toggle('active')}
}
function fmt(n){return Number(n).toLocaleString()}
function esc(s){const e=document.createElement('div');e.textContent=s||'';return e.innerHTML}
main();
</script>
</div>
</body>
</html>

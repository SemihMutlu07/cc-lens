<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>wrapminal — zine</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#F5F0E8;--pink:#FF3366;--blue:#1B3A6B;--ink:#1A1A2E}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#e8e0d0;font-family:'Space Grotesk',sans-serif;color:var(--ink);padding:24px}
.page{max-width:900px;margin:0 auto;background:var(--paper);padding:32px 28px;box-shadow:2px 2px 20px rgba(0,0,0,.08);position:relative}
.masthead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;position:relative}
.masthead-text{font-family:'Archivo Black',sans-serif;font-size:clamp(2.4rem,7vw,5.2rem);line-height:.82;text-transform:uppercase;letter-spacing:-.03em;transform:rotate(-.8deg);transform-origin:left center}
.masthead-text .pink{color:var(--pink)}.masthead-text .blue{color:var(--blue)}
.stamp{position:absolute;top:0;right:20px;transform:rotate(12deg);border:3px solid var(--pink);padding:4px 10px;font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--pink);background:var(--paper);mix-blend-mode:multiply}
.date-stamp{font-size:.65rem;color:#888;font-family:'JetBrains Mono',monospace;margin:4px 0 16px;transform:rotate(.4deg)}
.grid4{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:16px 0 20px}
.stat-block{padding:18px;transform:rotate(0deg);mix-blend-mode:multiply}
.stat-block:nth-child(1){background:var(--pink);transform:rotate(-1.2deg)}
.stat-block:nth-child(2){background:var(--blue);color:#e8eef5;transform:rotate(1.4deg)}
.stat-block:nth-child(3){background:var(--pink);transform:rotate(.7deg)}
.stat-block:nth-child(4){background:var(--blue);color:#e8eef5;transform:rotate(-.5deg)}
.stat-val{font-family:'Archivo Black',sans-serif;font-size:clamp(2rem,5vw,3.6rem);line-height:.8;margin-bottom:4px}
.stat-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;mix-blend-mode:difference}
.loops-hero{position:relative;padding:24px 20px;margin:16px 0;min-height:160px}
.loops-hero::before{content:'';position:absolute;inset:0;background:var(--pink);mix-blend-mode:multiply;z-index:0}
.loops-hero::after{content:'';position:absolute;inset:6px;border:2px solid var(--blue);mix-blend-mode:multiply;z-index:0}
.loops-content{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
.loops-left .loops-big{font-family:'Archivo Black',sans-serif;font-size:clamp(4rem,10vw,7rem);line-height:.78;color:var(--ink)}
.loops-left .loops-unit{font-size:.85rem;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.loops-badge{display:inline-block;border:2px solid var(--blue);padding:3px 10px;font-size:.55rem;font-weight:700;text-transform:uppercase;margin-top:12px;color:var(--ink);background:var(--paper);mix-blend-mode:multiply}
.trace-zine{font-size:.72rem;line-height:1.8}
.trace-zine .step{display:flex;gap:8px;align-items:center}
.trace-zine .step-num{font-family:'Archivo Black',sans-serif;font-size:.6rem;width:40px;color:var(--blue)}
.trace-zine .step-label{flex:1}
.trace-zine .step-status{font-weight:700;text-transform:uppercase;font-size:.6rem}
.trace-zine .fail{color:var(--pink)}.trace-zine .pass{color:var(--blue)}.trace-zine .work{color:#8b6914}
.forever-stamp{position:absolute;bottom:-8px;right:-4px;transform:rotate(-15deg);border:2px solid var(--pink);padding:3px 8px;font-size:.5rem;font-weight:700;text-transform:uppercase;color:var(--pink);background:var(--paper);mix-blend-mode:multiply}
.agent-row{display:flex;align-items:center;gap:10px;margin:6px 0;font-size:.78rem}
.agent-name{font-family:'Archivo Black',sans-serif;font-size:.72rem;text-transform:uppercase;width:100px;flex-shrink:0}
.agent-bar{height:16px;flex:1;min-width:10px;mix-blend-mode:multiply}
.agent-bar:nth-child(odd){background:var(--pink)}
.agent-bar:nth-child(even){background:var(--blue)}
.agent-count{font-family:'JetBrains Mono',monospace;font-size:.6rem;width:50px;text-align:right;color:#888}
.highlights-zine{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin:14px 0}
.highlight-card{padding:14px;font-size:.7rem;position:relative;mix-blend-mode:multiply}
.highlight-card:nth-child(odd){background:var(--pink);transform:rotate(-.5deg)}
.highlight-card:nth-child(even){background:var(--blue);color:#e8eef5;transform:rotate(.6deg)}
.highlight-card .hc-title{font-size:.55rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.highlight-card .hc-val{font-family:'Archivo Black',sans-serif;font-size:1.2rem;line-height:.85;margin-bottom:4px}
.highlight-card .hc-detail{font-size:.6rem;opacity:.75}
.timeline-zine{display:flex;align-items:flex-end;gap:6px;height:100px;margin:14px 0;overflow-x:auto;padding-bottom:10px}
.timeline-bar{flex:1;min-width:20px;position:relative;transform:rotate(0deg);mix-blend-mode:multiply}
.timeline-bar:nth-child(odd){background:var(--pink)}
.timeline-bar:nth-child(even){background:var(--blue)}
.timeline-bar::after{content:attr(data-label);position:absolute;top:100%;left:50%;transform:translateX(-50%) rotate(-45deg);font-size:.45rem;color:#888;white-space:nowrap;margin-top:2px}
.footer-zine{margin-top:24px;padding-top:16px;border-top:2px dashed var(--ink);display:grid;grid-template-columns:2fr 1fr;gap:16px}
.footer-big{font-family:'Archivo Black',sans-serif;font-size:clamp(1.2rem,3vw,2rem);text-transform:uppercase;line-height:.85;letter-spacing:-.01em}
.footer-big .pink{color:var(--pink)}.footer-big .blue{color:var(--blue)}
.colophon{font-size:.55rem;color:#888;line-height:1.5}
.privacy-note{border-top:1px dashed var(--ink);margin-top:12px;padding-top:12px;font-size:.55rem;font-family:'JetBrains Mono',monospace;color:#888}
.btn-expo{padding:10px;border:2px solid var(--ink);background:var(--paper);font:.65rem 'Archivo Black',sans-serif;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;width:100%;margin-top:16px}
.btn-expo:hover{background:var(--ink);color:var(--paper)}
@media(max-width:640px){body{padding:12px}.page{padding:20px 16px}.grid4{grid-template-columns:1fr}.loops-content{flex-direction:column}.footer-zine{grid-template-columns:1fr}.masthead-text{font-size:clamp(1.8rem,8vw,3.6rem)}}
</style>
</head>
<body>
<div class="page" id="page">
  <div class="masthead">
    <div>
      <div class="masthead-text"><span class="pink">WRAP</span><span class="blue">MINAL</span></div>
      <div class="date-stamp" id="zine-date"></div>
    </div>
    <div class="stamp">evidence-backed</div>
  </div>
  <p style="font-size:.82rem;line-height:1.4;margin-bottom:12px;transform:rotate(.3deg)">your local agent coding history, <span style="font-family:'Archivo Black',sans-serif;text-transform:uppercase">ripped and printed</span>.</p>
  <div id="stat-grid" class="grid4"></div>
  <div id="loops-section"></div>
  <div style="margin:16px 0 8px;display:flex;justify-content:space-between;align-items:baseline">
    <span style="font-family:'Archivo Black',sans-serif;font-size:.7rem;text-transform:uppercase">agent mix</span>
    <span style="font-size:.5rem;color:#888">prompts per agent</span>
  </div>
  <div id="agent-bars"></div>
  <div style="margin:16px 0 8px;display:flex;justify-content:space-between;align-items:baseline">
    <span style="font-family:'Archivo Black',sans-serif;font-size:.7rem;text-transform:uppercase">highlights</span>
    <span style="font-size:.5rem;color:#888">work patterns</span>
  </div>
  <div id="highlights-zine" class="highlights-zine"></div>
  <div style="margin:16px 0 8px;display:flex;justify-content:space-between;align-items:baseline">
    <span style="font-family:'Archivo Black',sans-serif;font-size:.7rem;text-transform:uppercase">weekly pulse</span>
    <span style="font-size:.5rem;color:#888">prompts per week</span>
  </div>
  <div id="timeline-zine" class="timeline-zine"></div>
  <div class="footer-zine">
    <div>
      <div class="footer-big"><span class="pink">KEEP</span><br><span class="blue">BUILDING</span></div>
      <button class="btn-expo" id="export-btn">⎙ export zine.svg</button>
    </div>
    <div>
      <div class="colophon" id="colophon"></div>
    </div>
  </div>
  <div class="privacy-note">raw prompts stay local · nothing is uploaded · generated by wrapminal</div>
</div>
<script>
async function load(){const r=await fetch('/api/wrapped');const d=await r.json();window.__d=d;render(d)}
function fmt(n){return Number(n).toLocaleString()}
function esc(s){const e=document.createElement('div');e.textContent=s;return e.innerHTML}
function render(d){
  const t=d.totals;const l=d.resolved_loops||{};const c=l.count||0;const p=l.evidence==='proven'&&c>0;
  const ex=l.example||{};const at=Math.max(Number(ex.attempts||0),2);
  const lb=c===1?'THE BUG BLINKED FIRST':c<5?'COMEBACK MERCHANT':'ABSOLUTELY REFUSED TO QUIT';
  document.getElementById('zine-date').textContent=new Date(d.generated_at).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
  document.getElementById('stat-grid').innerHTML=[['prompts',t.prompts],['sessions',t.sessions],['projects',t.projects],['active days',t.active_days]].map(([k,v])=>`<div class="stat-block"><div class="stat-val">${fmt(v)}</div><div class="stat-label">${esc(k)}</div></div>`).join('');
  // Loops
  document.getElementById('loops-section').innerHTML=p?`<div class="loops-hero"><div class="loops-content"><div class="loops-left"><div class="loops-big">${fmt(c)}</div><div class="loops-unit">loop${c!==1?'s':''} escaped</div><div class="loops-badge">${esc(lb)}</div></div><div class="trace-zine"><div class="step"><span class="step-num">01</span><span class="step-label">verification check</span><span class="step-status fail">✗ FAIL</span></div><div class="step"><span class="step-num">02</span><span class="step-label">${fmt(at)} verification attempts</span><span class="step-status work">→ WORK</span></div><div class="step"><span class="step-num">03</span><span class="step-label">later check in same session</span><span class="step-status pass">✓ PASS</span></div><div style="font-size:.5rem;color:#888;margin-top:6px">proven via ${esc(ex.source||'local history')} · ${fmt(l.sessions_scanned)} sessions</div></div></div><div class="forever-stamp">PROVEN</div></div>`:
  `<div class="loops-hero"><div class="loops-content"><div class="loops-left"><div class="loops-big">—</div><div class="loops-unit">no loops</div><div class="loops-badge">NOTHING GUESSED</div></div><div class="trace-zine"><div class="step"><span class="step-num">01</span><span class="step-label">${fmt(l.sessions_scanned||0)} sessions checked</span><span class="step-status pass">✓</span></div><div class="step"><span class="step-num">—</span><span class="step-label">no failed→passing verification pair</span><span class="step-status" style="color:#888">NONE</span></div></div></div></div>`;
  // Agent bars
  const agents=d.source_breakdown||[];const amax=Math.max(...agents.map(a=>a.prompts),1);
  document.getElementById('agent-bars').innerHTML=agents.map(a=>`<div class="agent-row"><span class="agent-name">${esc(a.name)}</span><span class="agent-bar" style="width:${(a.prompts/amax*100).toFixed(0)}%"></span><span class="agent-count">${fmt(a.prompts)}</span></div>`).join('');
  // Highlights
  document.getElementById('highlights-zine').innerHTML=(d.highlights||[]).map(h=>`<div class="highlight-card"><div class="hc-title">${esc(h.title)}</div><div class="hc-val">${esc(h.value)}</div><div class="hc-detail">${esc(h.detail)}</div></div>`).join('');
  // Timeline
  const weeks=(d.timeline&&d.timeline.weeks)||[];const wmax=Math.max(...weeks.map(w=>w.prompts),1);
  document.getElementById('timeline-zine').innerHTML=weeks.slice(-12).map(w=>`<div class="timeline-bar" style="height:${(w.prompts/wmax*90).toFixed(0)}%" data-label="${w.week.replace(/^\d{4}-W/,'W')}"></div>`).join('');
  // Colophon
  const sources=(d.highlights||[]).find(h=>h.title==='Main agent');
  document.getElementById('colophon').innerHTML=`zine no. 001<br>wrapminal v1.2.0<br>${new Date(d.generated_at).toLocaleDateString()}<br>${fmt(t.sources)} agents tracked<br>${fmt(t.active_days)} days of history<br>raw prompts stay local`;
}
function exportSVG(){
  const d=window.__d;if(!d)return;const t=d.totals;const l=d.resolved_loops||{};const c=l.count||0;
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="420" height="${c>0?580:520}" viewBox="0 0 420 ${c>0?580:520}"><rect width="420" height="${c>0?580:520}" fill="#F5F0E8"/><text x="30" y="44" font-family="Archivo Black,sans-serif" font-size="32" fill="#FF3366" transform="rotate(-.8,30,44)">WRAP</text><text x="128" y="44" font-family="Archivo Black,sans-serif" font-size="32" fill="#1B3A6B" transform="rotate(-.8,128,44)">MINAL</text><text x="210" y="68" font-size="9" font-family="monospace" fill="#888" text-anchor="middle" transform="rotate(.4,210,68)">ZINE NO. 001</text><line x1="20" y1="86" x2="400" y2="86" stroke="#1A1A2E" stroke-width="2" stroke-dasharray="2,3"/><text x="210" y="120" font-family="Archivo Black,sans-serif" font-size="48" fill="#FF3366" text-anchor="middle" transform="rotate(-1.2,210,120)">${fmt(t.prompts)}</text><text x="210" y="136" font-size="9" font-family="sans-serif" fill="#1A1A2E" text-anchor="middle" text-transform="uppercase">total prompts</text><text x="210" y="160" font-family="Archivo Black,sans-serif" font-size="30" fill="#1B3A6B" text-anchor="middle" transform="rotate(1.4,210,160)">${fmt(t.sessions)}</text><text x="210" y="174" font-size="9" font-family="sans-serif" fill="#1A1A2E" text-anchor="middle" text-transform="uppercase">sessions</text>${c>0?`<line x1="20" y1="200" x2="400" y2="200" stroke="#1A1A2E" stroke-width="2" stroke-dasharray="2,3"/><rect x="20" y="214" width="380" height="80" fill="#FF3366" opacity=".3"/><rect x="26" y="220" width="368" height="68" fill="none" stroke="#1B3A6B" stroke-width="2"/><text x="210" y="260" font-family="Archivo Black,sans-serif" font-size="44" fill="#1A1A2E" text-anchor="middle">${fmt(c)}</text><text x="210" y="278" font-size="10" font-family="sans-serif" fill="#1A1A2E" text-anchor="middle" font-weight="700" text-transform="uppercase">loops escaped</text>`:''}<text x="210" y="${c>0?520:480}" font-size="7" font-family="monospace" fill="#888" text-anchor="middle">raw prompts stay local · generated by wrapminal</text></svg>`;
  const b=new Blob([svg],{type:'image/svg+xml'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='wrapminal-zine.svg';a.click();
}
document.getElementById('export-btn').addEventListener('click',exportSVG);
load();
</script>
</body>
</html>
